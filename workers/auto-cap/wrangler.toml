name = "cykrus-auto-cap"
main = "src/index.ts"
compatibility_date = "2026-04-27"
compatibility_flags = ["nodejs_compat"]

# Limits (Cloudflare Free)
# - 100k requests/day (CPU 10ms, wir brauchen ~50ms für Anthropic-Call)
# - Workers Paid €5/Mo wenn überschritten

[[kv_namespaces]]
binding = "KV"
id = "<wird-bei-wrangler-kv-namespace-create-erzeugt>"

[vars]
ALERT_EMAIL = "info@cykrus.at"

# Rate-Limiting (10/min, 100/h, 500/d per IP)
[[unsafe.bindings]]
name = "RATE_LIMITER_MIN"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 10, period = 60 }

[[unsafe.bindings]]
name = "RATE_LIMITER_HOUR"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 100, period = 3600 }

[[unsafe.bindings]]
name = "RATE_LIMITER_DAY"
type = "ratelimit"
namespace_id = "1003"
simple = { limit = 500, period = 86400 }

# Secrets via: wrangler secret put ANTHROPIC_API_KEY
